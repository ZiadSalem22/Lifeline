name: CI (codebase)

on:
  push:
    branches: [main, rebuild/clean-room]
    paths: ['codebase/**', '.github/workflows/ci-codebase.yml']
  pull_request:
    paths: ['codebase/**', '.github/workflows/ci-codebase.yml']

concurrency:
  group: ci-codebase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: codebase/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run format
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
