name: Deploy Lifeline Production

on:
  push:
    branches:
      - deploy
  workflow_dispatch:

concurrency:
  group: lifeline-production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-to-vps:
    name: Deploy to production VPS
    runs-on: ubuntu-latest
    environment:
      name: production
    defaults:
      run:
        shell: bash
    env:
      DEPLOY_HOST: ${{ secrets.VPS_SSH_HOST }}
      DEPLOY_PORT: ${{ secrets.VPS_SSH_PORT }}
      DEPLOY_USER: ${{ secrets.VPS_SSH_USER }}
      KNOWN_HOSTS: ${{ secrets.VPS_SSH_KNOWN_HOSTS }}
      PRIVATE_KEY: ${{ secrets.VPS_SSH_PRIVATE_KEY }}
      RELEASES_ROOT: /opt/lifeline/releases
      SHARED_ENV_FILE: /opt/lifeline/shared/.env.production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Validate deployment secrets
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER KNOWN_HOSTS PRIVATE_KEY; do
            if [[ -z "${!name:-}" ]]; then
              echo "::error::Missing required deployment secret: ${name}"
              missing=1
            fi
          done

          if [[ -z "${DEPLOY_PORT:-}" ]]; then
            echo "DEPLOY_PORT=22" >> "$GITHUB_ENV"
          fi

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Derive release metadata
        id: release
        run: |
          set -euo pipefail
          timestamp="$(date -u +'%Y%m%d%H%M%S')"
          short_sha="${GITHUB_SHA::7}"
          release_id="lifeline-${timestamp}-${short_sha}"
          archive_name="${release_id}.tar.gz"

          echo "release_id=${release_id}" >> "$GITHUB_OUTPUT"
          echo "archive_name=${archive_name}" >> "$GITHUB_OUTPUT"

      - name: Build deploy artifact
        run: |
          set -euo pipefail
          git archive --format=tar.gz --output "$RUNNER_TEMP/${{ steps.release.outputs.archive_name }}" HEAD

      - name: Configure SSH
        run: |
          set -euo pipefail
          mkdir -p "$HOME/.ssh"
          chmod 700 "$HOME/.ssh"
          printf '%s\n' "$PRIVATE_KEY" > "$HOME/.ssh/id_ed25519"
          chmod 600 "$HOME/.ssh/id_ed25519"
          printf '%s\n' "$KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Upload release artifact
        run: |
          set -euo pipefail
          scp -P "${DEPLOY_PORT:-22}" "$RUNNER_TEMP/${{ steps.release.outputs.archive_name }}" "${DEPLOY_USER}@${DEPLOY_HOST}:${RELEASES_ROOT}/${{ steps.release.outputs.archive_name }}"

      - name: Reserve MCP loopback port on VPS
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" 'bash -s' <<'EOF'
          set -euo pipefail

          port="3010"

          if ! command -v sudo >/dev/null 2>&1; then
            echo "sudo is required to inspect and reserve port ${port} on the VPS host." >&2
            exit 1
          fi

          if ! sudo ss -ltn "( sport = :${port} )" | grep -q LISTEN; then
            exit 0
          fi

          echo "Port ${port} is already in use; inspecting current listener..."
          listener_report="$(sudo ss -ltnp "( sport = :${port} )" || true)"
          printf '%s\n' "${listener_report}"

          blocking_container="$(docker ps --format '{{.Names}}\t{{.Ports}}' | awk -F'\t' '$2 ~ /127\.0\.0\.1:'"${port}"'->/ { print $1; exit }')"
          if [[ -n "${blocking_container}" && "${blocking_container}" != "lifeline-mcp" ]]; then
            echo "Stopping Docker container that is occupying MCP port ${port}: ${blocking_container}"
            docker rm -f "${blocking_container}"
          fi

          if sudo ss -ltn "( sport = :${port} )" | grep -q LISTEN; then
            blocking_pids="$(printf '%s\n' "${listener_report}" | awk -F'pid=' 'NR > 1 && /pid=/ { split($2, parts, /[,)]/); print parts[1] }' | sort -u)"
            if [[ -n "${blocking_pids}" ]]; then
              echo "Stopping stale host listener(s) on MCP port ${port}: ${blocking_pids}"
              for pid in ${blocking_pids}; do
                pgid="$(sudo ps -o pgid= -p "${pid}" 2>/dev/null | tr -d ' ')"
                if [[ -n "${pgid}" ]]; then
                  echo "Stopping process group ${pgid} for stale MCP port listener ${pid}"
                  sudo kill -- -"${pgid}" 2>/dev/null || true
                fi
              done
              sudo kill ${blocking_pids}
              sudo pkill -f 'next-server' 2>/dev/null || true
              sleep 2
            fi
          fi

          if sudo ss -ltn "( sport = :${port} )" | grep -q LISTEN; then
            listener_report="$(sudo ss -ltnp "( sport = :${port} )" || true)"
            respawned_pids="$(printf '%s\n' "${listener_report}" | awk -F'pid=' 'NR > 1 && /pid=/ { split($2, parts, /[,)]/); print parts[1] }' | sort -u)"
            for pid in ${respawned_pids}; do
              unit_name="$(sudo cat "/proc/${pid}/cgroup" 2>/dev/null | sed -n 's#^.*/\([^/]*\.service\)$#\1#p' | head -n 1)"
              if [[ -n "${unit_name}" ]]; then
                echo "Stopping supervising systemd unit for MCP port ${port}: ${unit_name}"
                sudo systemctl stop "${unit_name}"
              fi
            done
            sleep 2
          fi

          if sudo ss -ltn "( sport = :${port} )" | grep -q LISTEN; then
            echo "Port ${port} is still occupied after cleanup; refusing to continue." >&2
            sudo ss -ltnp "( sport = :${port} )" || true
            exit 1
          fi
          EOF

      - name: Apply release on VPS
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
          ARCHIVE_NAME: ${{ steps.release.outputs.archive_name }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "RELEASE_ID='${RELEASE_ID}' RELEASES_ROOT='${RELEASES_ROOT}' ARCHIVE_NAME='${ARCHIVE_NAME}' SHARED_ENV_FILE='${SHARED_ENV_FILE}' bash -s" <<'EOF'
          set -euo pipefail

          release_dir="${RELEASES_ROOT}/${RELEASE_ID}"
          archive_path="${RELEASES_ROOT}/${ARCHIVE_NAME}"

          mkdir -p "${release_dir}"
          tar -xzf "${archive_path}" -C "${release_dir}"
          rm -f "${archive_path}"

          chmod +x "${release_dir}/deploy/scripts/apply-release.sh"
          "${release_dir}/deploy/scripts/apply-release.sh" "${release_dir}" "${SHARED_ENV_FILE}"
          EOF

      - name: Sync MCP Nginx config on VPS
        env:
          RELEASE_ID: ${{ steps.release.outputs.release_id }}
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "RELEASE_ID='${RELEASE_ID}' RELEASES_ROOT='${RELEASES_ROOT}' bash -s" <<'EOF'
          set -euo pipefail

          release_dir="${RELEASES_ROOT}/${RELEASE_ID}"
          source_conf="${release_dir}/deploy/nginx/mcp.lifeline.a2z-us.com.conf"

          if [[ ! -f "${source_conf}" ]]; then
            echo "MCP Nginx config missing from ${source_conf}" >&2
            exit 1
          fi

          if sudo test -d /etc/nginx/conf.d; then
            sudo install -m 644 "${source_conf}" /etc/nginx/conf.d/mcp.lifeline.a2z-us.com.conf
          elif sudo test -d /etc/nginx/sites-available && sudo test -d /etc/nginx/sites-enabled; then
            sudo install -m 644 "${source_conf}" /etc/nginx/sites-available/mcp.lifeline.a2z-us.com.conf
            sudo ln -sfn /etc/nginx/sites-available/mcp.lifeline.a2z-us.com.conf /etc/nginx/sites-enabled/mcp.lifeline.a2z-us.com.conf
          else
            echo "Could not find a supported Nginx include directory on the VPS host." >&2
            exit 1
          fi

          sudo nginx -t
          sudo systemctl reload nginx
          EOF

      - name: Verify public MCP health on VPS
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "curl --fail --silent --show-error --location 'https://mcp.lifeline.a2z-us.com/health' > /dev/null"

      - name: Capture failure diagnostics
        if: failure()
        run: |
          set +e
          ssh -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" '
            echo "--- current symlink ---"
            readlink -f /opt/lifeline/current || true
            echo "--- docker ps ---"
            docker ps -a || true
            echo "--- lifeline-app logs ---"
            docker logs --tail 200 lifeline-app || true
            echo "--- lifeline-postgres logs ---"
            docker logs --tail 200 lifeline-postgres || true
            echo "--- lifeline-mcp logs ---"
            docker logs --tail 200 lifeline-mcp || true
          '
