# Production compose for the clean-room codebase.
#
# Replaces the old root compose.production.yaml at deploy swap. Two services
# instead of three — the MCP server is embedded in the app (POST /mcp), so the
# standalone lifeline-mcp container, its shared secret, and the backend base URL
# are gone.
#
# DATA SURVIVAL: the postgres service keeps the SAME image, container name,
# credentials, and named volume (lifeline-postgres-data) as the old stack, so it
# binds to the existing production data. The app runs the idempotent baseline
# migration on start (adopts the live schema without destructive changes).
services:
  lifeline-postgres:
    image: postgres:16-alpine
    container_name: lifeline-postgres
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lifeline}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - lifeline-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-lifeline}']
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  lifeline-app:
    container_name: lifeline-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/}
        VITE_AUTH0_DOMAIN: ${VITE_AUTH0_DOMAIN:-}
        VITE_AUTH0_CLIENT_ID: ${VITE_AUTH0_CLIENT_ID:-}
        VITE_AUTH0_AUDIENCE: ${VITE_AUTH0_AUDIENCE:-}
    restart: unless-stopped
    mem_limit: 2g
    memswap_limit: 2g
    dns:
      - 1.1.1.1
      - 8.8.4.4
    depends_on:
      lifeline-postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # Built from the same POSTGRES_* the db service uses; override DATABASE_URL
      # directly in the shared env file if the DB lives elsewhere.
      DATABASE_URL: ${DATABASE_URL:-postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@lifeline-postgres:5432/${POSTGRES_DB:-lifeline}}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      # Auth0 (same tenant/vars as before). AUTH_DISABLED must be 0 in prod.
      AUTH_DISABLED: ${AUTH_DISABLED:-0}
      AUTH_LOCAL_USER_ID: ${AUTH_LOCAL_USER_ID:-guest-local}
      AUTH0_DOMAIN: ${AUTH0_DOMAIN:-}
      AUTH0_AUDIENCE: ${AUTH0_AUDIENCE:-}
      AUTH0_AUDIENCE_ALT: ${AUTH0_AUDIENCE_ALT:-}
      AUTH_TIMEOUT_MS: ${AUTH_TIMEOUT_MS:-10000}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://lifeline.a2z-us.com}
      # API key hashing pepper — REQUIRED non-empty in production.
      MCP_API_KEY_PEPPER: ${MCP_API_KEY_PEPPER:-}
      # Embedded MCP OAuth metadata (optional; falls back to AUTH0_* when unset).
      MCP_PUBLIC_BASE_URL: ${MCP_PUBLIC_BASE_URL:-https://mcp.lifeline.a2z-us.com}
      MCP_AUTH0_DOMAIN: ${MCP_AUTH0_DOMAIN:-}
      MCP_AUTH0_AUDIENCE: ${MCP_AUTH0_AUDIENCE:-}
      MCP_AUTH0_AUDIENCE_ALT: ${MCP_AUTH0_AUDIENCE_ALT:-}
      MCP_AUTH0_ISSUER: ${MCP_AUTH0_ISSUER:-}
      MCP_AUTH0_SUPPORTED_SCOPES: ${MCP_AUTH0_SUPPORTED_SCOPES:-tasks:read,tasks:write}
    ports:
      - '127.0.0.1:${APP_PORT:-3020}:3000'
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'node -e "fetch(''http://127.0.0.1:3000/health/ready'').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

volumes:
  lifeline-postgres-data:
